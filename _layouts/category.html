---
layout: archive
---

{{ content }}

<div class="archive-sort-buttons" style="margin-bottom: 2em; display: flex; gap: 0.5em;">
  <button id="btn-sort-date" class="btn btn--primary">최신순</button>
  <button id="btn-sort-modified" class="btn btn--inverse">최근 수정순</button>
</div>

{% assign entries_layout = page.entries_layout | default: 'list' %}

<div id="list-date">
  <div class="entries-{{ entries_layout }}">
    {% include posts-category.html taxonomy=page.taxonomy type=entries_layout %}
  </div>
</div>

<div id="list-modified" style="display: none;">
  <div class="entries-{{ entries_layout }}">
    {% include posts-category.html taxonomy=page.taxonomy type=entries_layout %}
  </div>
</div>

<script>
  function initSortButtonsCat() {
    var btnDate = document.getElementById("btn-sort-date");
    var btnModified = document.getElementById("btn-sort-modified");
    var listDate = document.getElementById("list-date");
    var listModified = document.getElementById("list-modified");
    
    if (!btnDate || !btnModified) return;

    var modifiedContainer = listModified.querySelector('.entries-{{ entries_layout }}');

    if (modifiedContainer && !modifiedContainer.dataset.sorted) {
      var modifiedItems = Array.from(modifiedContainer.children);
      modifiedItems.sort(function(a, b) {
        var aTime = parseInt(a.getAttribute('data-modified')) || 0;
        var bTime = parseInt(b.getAttribute('data-modified')) || 0;
        return bTime - aTime;
      });
      modifiedItems.forEach(function(item) {
        modifiedContainer.appendChild(item);
      });
      modifiedContainer.dataset.sorted = "true";
    }

    function showDate() {
      listDate.style.display = "block";
      listModified.style.display = "none";
      btnDate.className = "btn btn--primary";
      btnModified.className = "btn btn--inverse";
      try { sessionStorage.setItem('homeSort', 'date'); } catch(e) {}
    }

    function showModified() {
      listDate.style.display = "none";
      listModified.style.display = "block";
      btnDate.className = "btn btn--inverse";
      btnModified.className = "btn btn--primary";
      try { sessionStorage.setItem('homeSort', 'modified'); } catch(e) {}
    }

    btnDate.onclick = showDate;
    btnModified.onclick = showModified;

    try {
      if (sessionStorage.getItem('homeSort') === 'modified') {
        showModified();
      }
    } catch(e) {}
  }

  document.addEventListener("DOMContentLoaded", initSortButtonsCat);
  window.addEventListener("pageshow", function(e) {
    if (e.persisted) initSortButtonsCat();
  });
  if (document.readyState === "interactive" || document.readyState === "complete") {
    initSortButtonsCat();
  }
</script>
